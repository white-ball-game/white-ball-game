<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反転白玉ゲーム</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#f2f2f2;
    margin:20px;
}

h1{
    margin-bottom:10px;
}

#controls{
    margin-bottom:15px;
}

#info{
    margin:15px;
    font-size:18px;
}

#board{
    display:grid;
    gap:2px;
    justify-content:center;
    margin:auto;
}

.cell{
    background:#d0d0d0;
    border:1px solid #999;
    cursor:pointer;
    position:relative;
    box-sizing:border-box;
}

.cell.white::after,
.cell.black::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    border-radius:50%;
}

.cell.white::after{
    background:white;
    border:1px solid #666;
}

.cell.black::after{
    background:black;
}

button{
    padding:8px 15px;
    margin:5px;
    font-size:16px;
}

input{
    width:70px;
    text-align:center;
    font-size:16px;
}
</style>
</head>

<body>

<h1>反転白玉ゲーム</h1>

<div id="controls">
    盤面サイズ:
    <input
        type="number"
        id="sizeInput"
        min="2"
        max="50"
        value="12">

    <button onclick="startNewGame()">
        新しいゲーム
    </button>
</div>

<div id="info">
最初の白玉を置いてください
</div>

<div id="board"></div>

<script>

let SIZE = 12;
let CELL_SIZE = 45;

let board = [];
let firstMove = true;

const boardElement =
    document.getElementById("board");

const info =
    document.getElementById("info");

function getCellSize(){

    if(SIZE <= 10) return 45;
    if(SIZE <= 20) return 35;
    if(SIZE <= 30) return 28;

    return 22;
}

function initBoard(){

    board = Array.from(
        {length:SIZE},
        ()=>Array(SIZE).fill(0)
    );
}

function render(){

    boardElement.innerHTML = "";

    for(let y=0;y<SIZE;y++){

        for(let x=0;x<SIZE;x++){

            const cell =
                document.createElement("div");

            cell.className = "cell";

            cell.style.width =
                CELL_SIZE + "px";

            cell.style.height =
                CELL_SIZE + "px";

            if(board[y][x] === 1){
                cell.classList.add("white");
            }

            if(board[y][x] === 2){
                cell.classList.add("black");
            }

            cell.onclick =
                ()=>clickCell(x,y);

            boardElement.appendChild(cell);
        }
    }

    let style =
        document.getElementById(
            "stoneStyle"
        );

    if(!style){

        style =
            document.createElement(
                "style"
            );

        style.id =
            "stoneStyle";

        document.head.appendChild(
            style
        );
    }

    const stoneSize =
        Math.floor(CELL_SIZE * 0.7);

    style.textContent = `
        .cell.white::after,
        .cell.black::after{
            width:${stoneSize}px;
            height:${stoneSize}px;
        }
    `;
}

function hasAdjacentStone(x,y){

    const dirs = [
        [0,-1],
        [0,1],
        [-1,0],
        [1,0]
    ];

    for(const [dx,dy] of dirs){

        const nx = x + dx;
        const ny = y + dy;

        if(
            nx >= 0 &&
            nx < SIZE &&
            ny >= 0 &&
            ny < SIZE &&
            board[ny][nx] !== 0
        ){
            return true;
        }
    }

    return false;
}

function flipAdjacent(x,y){

    const dirs = [
        [0,-1],
        [0,1],
        [-1,0],
        [1,0]
    ];

    for(const [dx,dy] of dirs){

        const nx = x + dx;
        const ny = y + dy;

        if(
            nx < 0 ||
            nx >= SIZE ||
            ny < 0 ||
            ny >= SIZE
        ){
            continue;
        }

        if(board[ny][nx] === 1){
            board[ny][nx] = 2;
        }
        else if(board[ny][nx] === 2){
            board[ny][nx] = 1;
        }
    }
}

function clickCell(x,y){

    if(board[y][x] !== 0){
        return;
    }

    if(firstMove){

        board[y][x] = 1;

        firstMove = false;

        info.textContent =
            "空いているマスをクリックしてください";

        render();

        return;
    }

    if(!hasAdjacentStone(x,y)){
        return;
    }

    board[y][x] = 1;

    flipAdjacent(x,y);

    render();

    checkClear();
}

function checkClear(){

    let filled = 0;

    for(let y=0;y<SIZE;y++){
        for(let x=0;x<SIZE;x++){
            if(board[y][x] !== 0){
                filled++;
            }
        }
    }

    if(filled === SIZE * SIZE){

        let white = 0;
        let black = 0;

        for(let y=0;y<SIZE;y++){
            for(let x=0;x<SIZE;x++){

                if(board[y][x] === 1){
                    white++;
                }

                if(board[y][x] === 2){
                    black++;
                }
            }
        }

        info.textContent =
            `完成！ 白:${white}　黒:${black}`;
    }
}

function startNewGame(){

    const value =
        parseInt(
            document.getElementById(
                "sizeInput"
            ).value
        );

    if(
        isNaN(value) ||
        value < 2 ||
        value > 50
    ){
        alert(
            "2～50を入力してください"
        );
        return;
    }

    SIZE = value;

    CELL_SIZE =
        getCellSize();

    boardElement.style.gridTemplateColumns =
        `repeat(${SIZE}, ${CELL_SIZE}px)`;

    boardElement.style.gridTemplateRows =
        `repeat(${SIZE}, ${CELL_SIZE}px)`;

    initBoard();

    firstMove = true;

    info.textContent =
        "最初の白玉を置いてください";

    render();
}

startNewGame();

</script>

</body>
</html>
